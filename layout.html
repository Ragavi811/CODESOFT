<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster AI</title>
    <style>
        :root {
            --primary: #6366f1;
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            color: var(--text);
            /* Replace the URL below with any high-res image you like */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        nav {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1, h2 { text-align: center; margin-bottom: 30px; }

        .btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 25px 0;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        ::placeholder { color: #ddd; }

        .quiz-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <h2 style="margin:0">QuizMaster</h2>
        <div>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('create') }}">Create Quiz</a>
            <a href="{{ url_for('list_quizzes') }}">Browse</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
